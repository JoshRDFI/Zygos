# Example provider-focused configuration for Phase 2 hardening
runtime:
  maxTurns: 10
  maxToolCallsPerTurn: 6
  enableStreamingTools: true

providers:
  primary:
    provider: openai
    model: gpt-4o-mini
    weight: 1
  fallbacks:
    - provider: anthropic
      model: claude-3-5-haiku-latest
      weight: 1
    - provider: ollama
      model: llama3.1:8b
      weight: 1
  retry:
    maxAttempts: 2
    baseDelayMs: 300
    maxDelayMs: 2000
    jitterRatio: 0.15
  circuitBreaker:
    failureThreshold: 2
    resetTimeoutMs: 15000
    halfOpenMaxRequests: 1
  rateLimit:
    maxRequestsPerMinute: 60
    burst: 10
  observability:
    debug: true
  gracefulDegradationMessage: Provider capacity is constrained right now. Please retry shortly.
  credentials:
    openai:
      enabled: true
      apiKey: ${OPENAI_API_KEY}
      timeoutMs: 45000
      models: ["gpt"]
      headers: {}
      weight: 1
      requestSizeLimitBytes: 1048576
      requireApiKey: true
    anthropic:
      enabled: true
      apiKey: ${ANTHROPIC_API_KEY}
      timeoutMs: 45000
      models: ["claude"]
      headers: {}
      weight: 1
      requestSizeLimitBytes: 1048576
      requireApiKey: true
    ollama:
      enabled: true
      baseUrl: http://127.0.0.1:11434
      timeoutMs: 45000
      models: ["llama"]
      headers: {}
      weight: 1
      requestSizeLimitBytes: 1048576
      requireApiKey: false

rdt:
  enabled: false
  maxRecurrentSteps: 3
