runtime:
  maxTurns: 20
  maxToolCallsPerTurn: 8
  enableStreamingTools: false

providers:
  primary:
    provider: ollama
    model: llama3.1:8b
    weight: 1
  fallbacks:
    - provider: openai
      model: gpt-4o-mini
      weight: 1
    - provider: anthropic
      model: claude-3-5-haiku-latest
      weight: 1
  retry:
    maxAttempts: 3
    baseDelayMs: 400
    maxDelayMs: 5000
    jitterRatio: 0.2
  circuitBreaker:
    failureThreshold: 3
    resetTimeoutMs: 30000
    halfOpenMaxRequests: 1
  rateLimit:
    maxRequestsPerMinute: 120
    burst: 20
  observability:
    debug: false
  gracefulDegradationMessage: All model providers are currently unavailable. Please retry in a moment.
  credentials:
    openai:
      enabled: true
      apiKey: ${OPENAI_API_KEY}
      timeoutMs: 45000
      models: ["gpt"]
      headers: {}
      weight: 1
      requestSizeLimitBytes: 1048576
      requireApiKey: true
    anthropic:
      enabled: true
      apiKey: ${ANTHROPIC_API_KEY}
      timeoutMs: 45000
      models: ["claude"]
      headers: {}
      weight: 1
      requestSizeLimitBytes: 1048576
      requireApiKey: true
    ollama:
      enabled: true
      baseUrl: http://127.0.0.1:11434
      timeoutMs: 45000
      models: ["llama", "qwen", "mistral"]
      headers: {}
      weight: 1
      requestSizeLimitBytes: 1048576
      requireApiKey: false
    vllm:
      enabled: false
      baseUrl: http://127.0.0.1:8000/v1
      timeoutMs: 45000
      models: ["llama", "mistral", "qwen"]
      headers: {}
      weight: 1
      requestSizeLimitBytes: 1048576
      requireApiKey: false
    custom:
      enabled: true
      timeoutMs: 30000
      models: []
      headers: {}
      weight: 1
      requestSizeLimitBytes: 262144
      requireApiKey: false

rdt:
  enabled: false
  profile: balanced
  prelude:
    enabled: true
    temperature: 0.1
    maxTokens: 512
    systemInstruction: "Initialize context and decompose the task into structured sub-problems."
  recurrent:
    enabled: true
    temperature: 0.2
    maxTokens: 700
    minLoopIters: 1
    maxLoopIters: 4
    allowBacktracking: true
    allowParallelPaths: true
    systemInstruction: "Iteratively refine reasoning with consistency checks and revisions."
  coda:
    enabled: true
    temperature: 0.1
    maxTokens: 900
    systemInstruction: "Synthesize a concise, correct final answer."
  loop:
    maxLoopIters: 4
    minLoopIters: 1
    maxRevisionDepth: 2
  confidence:
    thresholds:
      earlyExit: 0.84
      revise: 0.55
      floor: 0.25
    adaptive: true
    adaptUpDelta: 0.03
    adaptDownDelta: 0.04
    smoothingFactor: 0.55
  attention:
    defaultMode: auto
    switchByTask: true
    modeSwitchComplexityThreshold: 0.55
    moe:
      enabled: true
      routedExperts: ["math", "coding", "research", "planning"]
      sharedExperts: ["synthesis", "verification"]
      topK: 2
      maxParallelExperts: 3
      loadBalanceWindow: 10
  quality:
    enableTraceLogging: true
    preserveReasoningChain: true
    computeAdaptive: true
    enableMultiHop: true

learning:
  enabled: true
  approvalMode: manual
  autoApplyLowRisk: false
  maxProposalsPerCycle: 3
  minObservationsForProposal: 8
  observeWindowSize: 200
  maxModificationsPerHour: 20
  maxToolCreationsPerDay: 20
  abTestSampleSize: 6
  maxLatencyRegressionRatio: 0.2
  minSuccessRateGain: 0.03
  maxResourceCostPerTestMs: 8000

interview:
  enabled: true
  requireForComplexBuilds: true
  complexityThreshold: 3.25
  maxQuestions: 12
  allowBypassForSimpleRequests: true
  allowOverrideByFlag: true
  template: auto
